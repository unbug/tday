appId: com.tday.app
productName: Tday
directories:
  output: release/${version}
  buildResources: build
files:
  - out/**
  - package.json
  - "!**/{.DS_Store,.git,*.map}"
  - "!**/node_modules/*/{CHANGELOG.md,README.md,readme.md,readme}"
asar: true
asarUnpack:
  - "**/node_modules/node-pty/**/*"
extraResources:
  - from: resources/CoWorkers
    to: CoWorkers
    filter:
      - "**/*.md"
  - from: resources/CoWorkers.md
    to: CoWorkers.md
  - from: resources/pi-computer-use-bridge.ts
    to: pi-computer-use-bridge.ts

# ── macOS ──────────────────────────────────────────────────────────────────────
mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  extendInfo:
    NSLocalNetworkUsageDescription: "Tday needs local network access to connect to local AI models (e.g., LM Studio)."
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  artifactName: "Tday-${version}-mac-${arch}.${ext}"
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null
  # tday-devtools MCP binary (built by cargo before packaging)
  extraResources:
    - from: ../../crates/tday-devtools/target/release/tday-devtools
      to: tday-devtools

# ── Windows ────────────────────────────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64
  artifactName: "Tday-${version}-win-${arch}.${ext}"
  # tday-devtools MCP binary
  extraResources:
    - from: ../../crates/tday-devtools/target/release/tday-devtools.exe
      to: tday-devtools.exe

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  runAfterFinish: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Tday

# ── Linux ──────────────────────────────────────────────────────────────────────
linux:
  category: Development
  # tday-devtools MCP binary
  extraResources:
    - from: ../../crates/tday-devtools/target/release/tday-devtools
      to: tday-devtools
  executableName: Tday
  target:
    - target: AppImage
      arch:
        - x64
    - target: tar.gz
      arch:
        - x64
  artifactName: "Tday-${version}-linux-${arch}.${ext}"

# ── DMG (macOS only) ───────────────────────────────────────────────────────────
dmg:
  artifactName: "Tday-${version}-mac-${arch}.${ext}"
  writeUpdateInfo: false
