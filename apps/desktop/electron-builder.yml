appId: com.tday.app
productName: Tday
directories:
  output: release/${version}
  buildResources: build
files:
  - out/**
  - package.json
  - "!**/{.DS_Store,.git,*.map}"
  - "!**/node_modules/*/{CHANGELOG.md,README.md,readme.md,readme}"
asar: true
asarUnpack:
  - "**/node_modules/node-pty/**/*"
extraResources:
  - from: resources/CoWorkers
    to: CoWorkers
    filter:
      - "**/*.md"
  - from: resources/CoWorkers.md
    to: CoWorkers.md

# ── macOS ──────────────────────────────────────────────────────────────────────
mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  artifactName: "Tday-${version}-mac-${arch}.${ext}"
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null

# ── Windows ────────────────────────────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64
  artifactName: "Tday-${version}-win-${arch}.${ext}"

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  runAfterFinish: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Tday

# ── Linux ──────────────────────────────────────────────────────────────────────
linux:
  category: Development
  executableName: Tday
  target:
    - target: AppImage
      arch:
        - x64
    - target: tar.gz
      arch:
        - x64
  artifactName: "Tday-${version}-linux-${arch}.${ext}"

# ── DMG (macOS only) ───────────────────────────────────────────────────────────
dmg:
  artifactName: "Tday-${version}-mac-${arch}.${ext}"
  writeUpdateInfo: false
