name: Create Bug Issues

on:
  workflow_dispatch:

jobs:
  create-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create P1 - u32 underflow in find_image search_region bounds
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[P1] u32 underflow / integer overflow in find_image search_region bounds',
              labels: ['bug'],
              body: `## Priority: P1

## Description
When a caller provides a \`search_region\` whose \`x\` or \`y\` exceeds the screenshot dimensions, the expression \`ss_w - r.x\` (both are \`u32\`) underflows. In **debug mode** this panics; in **release mode** it wraps around to a huge value, producing a nonsense crop rectangle and corrupting the template-matching result. There is no validation that \`r.x <= ss_w\` and \`r.y <= ss_h\` before the subtraction.

## File
\`crates/tday-nativecore/src/find_image.rs\`, lines 83–84

## Code Snippet
\`\`\`rust
Some(r) => (r.x, r.y, r.w.min(ss_w - r.x), r.h.min(ss_h - r.y)),
\`\`\`

## Impact
- Debug builds: **panic** (process crash) when search_region extends past screenshot bounds.
- Release builds: **integer wrap-around** producing an enormous crop rectangle, corrupting NCC template-matching results and returning incorrect match coordinates.

## Suggested Fix
\`\`\`rust
if r.x >= ss_w || r.y >= ss_h {
    return Err(NcError::tool("search_region out of bounds"));
}
(r.x, r.y, r.w.min(ss_w - r.x), r.h.min(ss_h - r.y))
\`\`\`
`
            });

      - name: Create P1 - HTTP MCP server has no authentication
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[P1] HTTP MCP server has no authentication — any local process can execute arbitrary shell commands',
              labels: ['bug', 'security'],
              body: `## Priority: P1 (Security)

## Description
When the nativecore HTTP server is started (shared across sessions), it binds to \`127.0.0.1\` with **no authentication token, no session validation, and no per-source access control**. Any local process on the machine can POST to the MCP endpoint and invoke:
- \`execute_command\` — arbitrary \`sh -c\` shell execution
- \`filesystem\` — read/write/delete any file path
- \`clipboard\` — read/write clipboard
- \`take_screenshot\` — screenshot capture
- Full mouse/keyboard control

The server remains alive for **60 seconds** after the last session, extending the attack window.

## File
\`apps/desktop/src/main/nativecore-service.ts\`, lines 148–185 (\`startHttpServer\`); also \`crates/tday-nativecore/src/handlers/system.rs\`

## Code Snippet
\`\`\`typescript
// No auth header check or token verification
const proc = spawn(bin, ['--http', '--port', '0'], { ... });
\`\`\`

## Impact
**Local privilege escalation**: any process running as the same or lower privilege user can execute arbitrary shell commands, exfiltrate files, or take full UI control through the unauthenticated HTTP endpoint.

## Suggested Fix
Generate a random bearer token when starting the HTTP server, pass it to the nativecore binary via \`--auth-token\`, and require \`Authorization: Bearer <token>\` on every request. Reject requests that omit or fail the token check.
`
            });

      - name: Create P1 - TOCTOU race in singleton lock acquisition
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[P1] TOCTOU race in singleton lock acquisition — no file locking primitive used',
              labels: ['bug'],
              body: `## Priority: P1

## Description
The \`acquire()\` function performs three non-atomic steps:
1. Read the lock file to get the old PID
2. Kill the old process
3. Write the new PID

This entire sequence is **non-atomic**. If two nativecore processes start simultaneously, both can read the same stale PID in step 1, both kill it in step 2, and then both overwrite each other's PID in step 3. The result: one process runs without a valid lock. There is no \`flock(2)\` or equivalent exclusive file lock around the check-kill-write sequence.

## File
\`crates/tday-nativecore/src/singleton.rs\`, lines ~30–70 (\`acquire()\`)

## Code Snippet
\`\`\`rust
// Both processes race between read_lock_pid() and write_lock_pid()
let old = read_lock_pid(&lock_path);
if let Some(pid) = old { kill_process(pid); }
write_lock_pid(&lock_path, std::process::id());
\`\`\`

## Impact
Two nativecore instances can run simultaneously, leading to duplicate port bindings, conflicting state, resource contention, or corrupt application state.

## Suggested Fix
Use \`OpenOptions\` with \`O_CREAT | O_EXCL\` for atomic creation, or acquire a \`flock(LOCK_EX)\` on the lock file and hold it for the entire check-kill-write sequence.
`
            });

      - name: Create P1 - pkill -s flag filters by session ID not signal
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[P1] pkill -s flag filters by session ID, not signal — force/SIGKILL is silently ignored',
              labels: ['bug'],
              body: `## Priority: P1

## Description
The \`handle_process\` kill-by-name path runs \`pkill -s <signal_number> <name>\`. On Linux and macOS, \`-s\` is the **session ID** filter, **not** a signal selector. The actual kill always uses the default SIGTERM regardless of the \`force: true\` (SIGKILL) parameter.

To send a specific signal by number, the correct flag is \`-<N>\` (e.g., \`pkill -9 name\`). On macOS, the correct form is \`-SIGKILL\` or \`-9\`, not \`-s 9\`.

## File
\`crates/tday-nativecore/src/handlers/system.rs\`, lines ~404–406

## Code Snippet
\`\`\`rust
std::process::Command::new("pkill").args(["-s", signal, name.as_deref().unwrap_or("")])
\`\`\`

## Impact
- The \`force: true\` option (intended to send SIGKILL) is silently ignored; only SIGTERM is ever sent.
- Processes that ignore SIGTERM (e.g., processes in uninterruptible sleep or those that catch SIGTERM) cannot be force-killed as the API contract promises.
- The \`-s\` flag may unintentionally kill all processes in a session ID matching the signal number.

## Suggested Fix
\`\`\`rust
std::process::Command::new("pkill").args([&format!("-{}", signal), name.as_deref().unwrap_or("")])
// e.g., pkill -9 <name> or pkill -15 <name>
\`\`\`
`
            });

      - name: Create P2 - Parent-watch thread spawn failure silently ignored
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[P2] Parent-watch thread spawn failure is silently ignored — process becomes orphan',
              labels: ['bug'],
              body: `## Priority: P2

## Description
The parent-death monitoring thread is created with \`let _ = std::thread::Builder::new()...spawn(move || { ... })\`. If thread creation fails (e.g., resource exhaustion, OS limit), the \`Result\` is discarded via \`let _\` and the error is silently swallowed.

The nativecore process then runs **forever as an orphan** after its Electron parent exits, holding onto system resources and port bindings.

## File
\`crates/tday-nativecore/src/parent_watch.rs\`, line 97

## Code Snippet
\`\`\`rust
let _ = std::thread::Builder::new()
    .name("parent-watch".into())
    .spawn(move || { ... });
\`\`\`

## Impact
If thread spawn fails, the nativecore process becomes an orphan daemon. It holds the HTTP server port and system resources indefinitely. The next launch will either fail (port conflict) or kill an unrelated process matching the PID from the stale lock file.

## Suggested Fix
\`\`\`rust
std::thread::Builder::new()
    .name("parent-watch".into())
    .spawn(move || { ... })
    .unwrap_or_else(|e| {
        eprintln!("parent-watch spawn failed: {e}");
        std::process::exit(1);
    });
\`\`\`
`
            });

      - name: Create P2 - filesystem copy mode silently ignores cp exit status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[P2] filesystem "copy" mode silently ignores cp exit status — failed copies return ok:true',
              labels: ['bug'],
              body: `## Priority: P2

## Description
The \`filesystem\` handler's \`"copy"\` mode runs \`cp -R <src> <dest>\` and calls \`.status()\`, but the \`Result<ExitStatus>\` value is **never inspected**. A failed \`cp\` (permission denied, disk full, source not found) returns \`{ "ok": true }\` to the caller, making failures completely invisible.

## File
\`crates/tday-nativecore/src/handlers/system.rs\`, lines ~530–534

## Code Snippet
\`\`\`rust
std::process::Command::new("cp").args(["-R", &path, &dest]).status(); // result dropped
Ok(json!({ "ok": true }))
\`\`\`

## Impact
Callers receive a success response even when the file copy failed. This can lead to silent data loss (e.g., a backup operation appearing to succeed when it didn't), incorrect application state, or users believing their data was saved when it wasn't.

## Suggested Fix
\`\`\`rust
let status = std::process::Command::new("cp")
    .args(["-R", &path, &dest])
    .status()
    .map_err(|e| NcError::tool(format!("cp exec: {e}")))?;
if !status.success() {
    return Err(NcError::tool(format!("cp failed: exit {}", status)));
}
Ok(json!({ "ok": true }))
\`\`\`
`
            });

      - name: Create P2 - filesystem search allows arbitrary path traversal
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[P2] filesystem "search" mode allows arbitrary path traversal — no input validation',
              labels: ['bug', 'security'],
              body: `## Priority: P2 (Security)

## Description
The \`"search"\` mode runs \`find <user_path> -name <user_pattern>\` with both arguments taken directly from user input. There is **no validation** to prevent:
- \`path = "/"\` — enumerate the entire filesystem
- \`path = "../../etc"\` — path traversal
- Shell-special patterns in \`pattern\` that interact with the \`find\` command

## File
\`crates/tday-nativecore/src/handlers/system.rs\`, lines ~560–570

## Code Snippet
\`\`\`rust
Command::new("find").args([&path, "-name", &pattern]).output()
\`\`\`

## Impact
Any agent (or unauthenticated HTTP client via the unprotected HTTP endpoint) can enumerate the entire filesystem, discover sensitive files, and retrieve their paths.

## Suggested Fix
1. Canonicalize the path and restrict it to a configurable safe root (e.g., home directory)
2. Validate and sanitize the \`pattern\` argument (disallow shell metacharacters)
3. Consider using Rust's \`std::fs::read_dir\` recursion instead of spawning \`find\` to avoid shell interpretation entirely
`
            });

      - name: Create P2 - handle_process list uses Unix-only ps flags
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[P2] handle_process list uses Unix-only ps flags — crashes on Windows',
              labels: ['bug'],
              body: `## Priority: P2

## Description
\`handle_process\` with \`mode: "list"\` runs \`ps -axo pid,pcpu,pmem,comm\` which is a **Unix/macOS-only command**. On Windows this will fail with "command not found" or return garbage output. The crate targets Windows (\`platform/windows/\`) but has no platform-conditional logic for process listing.

## File
\`crates/tday-nativecore/src/handlers/system.rs\`, lines ~350–370

## Code Snippet
\`\`\`rust
Command::new("ps").args(["-axo", "pid,pcpu,pmem,comm"])
\`\`\`

## Impact
The \`list_processes\` tool completely fails on Windows, returning an error or empty result. This breaks any agent workflow that relies on process enumeration on Windows hosts.

## Suggested Fix
\`\`\`rust
#[cfg(windows)]
let output = Command::new("tasklist").args(["/FO", "CSV", "/NH"]).output()?;

#[cfg(not(windows))]
let output = Command::new("ps").args(["-axo", "pid,pcpu,pmem,comm"]).output()?;
\`\`\`
Or use the \`sysinfo\` crate for cross-platform process enumeration.
`
            });

      - name: Create P2 - CronScheduler setTimeout overflow for long-horizon jobs
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[P2] CronScheduler setTimeout overflow fires monthly/yearly jobs immediately in a tight loop',
              labels: ['bug'],
              body: `## Priority: P2

## Description
JavaScript's \`setTimeout\` **silently fires immediately** when the delay exceeds \`2^31 - 1\` ms (~24.8 days). Monthly cron jobs have delays of ~30 days and yearly jobs ~365 days.

The \`reschedule\` function computes \`delay = nextTs - Date.now()\` and passes it directly to \`setTimeout(callback, Math.max(0, delay))\`. For long-horizon schedules, the delay is a large positive number exceeding the 32-bit max, so \`setTimeout\` fires immediately and the job runs in a tight loop on every reschedule tick.

## File
\`apps/desktop/src/main/cron.ts\`, lines ~95–115 (\`reschedule()\`)

## Code Snippet
\`\`\`typescript
const delay = nextTs - Date.now();
this.timerId = setTimeout(() => this.onFire(job), Math.max(0, delay));
\`\`\`

## Impact
Monthly and yearly scheduled tasks execute immediately and repeatedly instead of waiting for the scheduled time. This can cause unintended repeated execution of scheduled agent tasks, performance degradation, and unpredictable behavior.

## Suggested Fix
\`\`\`typescript
const MAX_TIMEOUT_MS = 2 ** 31 - 1;
const delay = nextTs - Date.now();
const clampedDelay = Math.min(Math.max(0, delay), MAX_TIMEOUT_MS);
this.timerId = setTimeout(() => {
  if (Date.now() >= nextTs) {
    this.onFire(job);
  } else {
    this.reschedule(job); // re-evaluate when cap fires
  }
}, clampedDelay);
\`\`\`
`
            });

      - name: Create P2 - Unvalidated role field passed to Anthropic API
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[P2] Unvalidated role field passed directly to Anthropic messages API causes 400 errors',
              labels: ['bug'],
              body: `## Priority: P2

## Description
The \`convertInput\` function builds Anthropic \`messages\` from OpenAI Responses API items. The \`role\` field of each input item is used **verbatim** as the Anthropic message role (\`const r = role || 'user'\`).

Anthropic's Messages API only accepts \`'user'\` or \`'assistant'\` as roles. An invalid role value (\`'tool'\`, \`'function'\`, \`'system'\`, or any typo) is passed through unchanged and causes a **400 error** from the Anthropic API that surfaces as an opaque gateway error to the agent.

## File
\`apps/desktop/src/main/gateway/bridge/input.ts\`, lines 362–365

## Code Snippet
\`\`\`typescript
const r = role || 'user';
messages.push({ role: r, content: blocks });
\`\`\`

## Impact
Agents using Anthropic models via the gateway receive cryptic 400 errors when messages contain non-standard roles (e.g., \`'tool'\` or \`'system'\`). System-role messages are incorrectly embedded in the messages array instead of the Anthropic \`system\` parameter, causing model behavior issues.

## Suggested Fix
\`\`\`typescript
// Map to valid Anthropic roles; extract system messages separately
const r = (role === 'assistant') ? 'assistant' : 'user';
messages.push({ role: r, content: blocks });
// System role items should be collected and passed to the top-level system parameter
\`\`\`
`
            });

      - name: Create P2 - NCC NaN/Inf similarity score on zero-norm template
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[P2] NCC template matching produces NaN/Inf similarity score on zero-norm template — silent false negatives',
              labels: ['bug'],
              body: `## Priority: P2

## Description
The NCC computation uses \`let denom = norm_s * norm_t\` and guards with \`if denom < 1e-9 { return 0.0; }\`. However, floating-point arithmetic can produce \`denom == 0.0\` (exact zero, not \`< 1e-9\`) when either norm is a subnormal. In that case:
1. The guard is **bypassed** (\`0.0 < 1e-9\` is \`true\`, but exact-zero subnormals may not satisfy this)
2. \`corr / denom\` produces \`NaN\` or \`±Inf\`
3. \`NaN >= threshold\` evaluates to \`false\`, silently dropping valid matches

## File
\`crates/tday-nativecore/src/find_image.rs\`, lines ~130–155 (\`ncc_at\` / \`find_best_match\`)

## Code Snippet
\`\`\`rust
if denom < 1e-9 { return 0.0; }
corr / denom
\`\`\`

## Impact
Pathological template images (e.g., solid-color patches, very small templates) can cause \`find_image\` to return "not found" even when a perfect match exists. This produces silent false negatives that are hard to diagnose.

## Suggested Fix
\`\`\`rust
if denom == 0.0 || !denom.is_finite() { return 0.0; }
(corr / denom).clamp(-1.0, 1.0)
\`\`\`
`
            });

      - name: Create P2 - Non-null assertion proc.stdout crashes if stdout unavailable
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[P2] Non-null assertion proc.stdout! crashes nativecore service if stdout is unavailable',
              labels: ['bug'],
              body: `## Priority: P2

## Description
\`proc.stdout!.on('data', ...)\` uses a TypeScript non-null assertion. The nativecore process is spawned with \`stdio: ['pipe', 'pipe', 'pipe']\`, so \`stdout\` should normally be non-null.

However, if the spawn options are ever changed, or if \`proc.stdout\` is \`null\` due to a Node.js version difference or platform behavior, the non-null assertion throws a \`TypeError: Cannot read properties of null\` at startup. This crashes the nativecore service **silently without a useful error message**.

## File
\`apps/desktop/src/main/nativecore-service.ts\`, line 176

## Code Snippet
\`\`\`typescript
proc.stdout!.on('data', (data: Buffer) => { ... });
\`\`\`

## Impact
Silent crash of the nativecore service at startup. No error is surfaced to the user, making debugging difficult. All tool calls (screenshot, AX, filesystem, etc.) fail with cryptic errors.

## Suggested Fix
\`\`\`typescript
if (!proc.stdout) {
  throw new Error('nativecore stdout is null — check stdio config');
}
proc.stdout.on('data', (data: Buffer) => { ... });
\`\`\`
`
            });

      - name: Create P2 - conversations map grows unboundedly — memory leak
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[P2] adapter.ts conversations and thinkingStates maps grow unboundedly — memory leak in long-running sessions',
              labels: ['bug'],
              body: `## Priority: P2

## Description
\`CodexDeepSeekAnthropicAdapter\` stores every conversation by its \`responseId\` in \`this.conversations\`. Each entry contains the full message history. There is **no TTL, LRU eviction, or maximum size**.

In a long-running Electron session with many LLM calls, this map grows without bound. A 100-turn conversation with large context windows can accumulate megabytes per session. The map is only cleared on \`close()\`. Similarly, \`thinkingStates\` accumulates entries per session key with no cleanup.

## File
\`apps/desktop/src/main/gateway/adapter.ts\`, lines 64–65, 213, 314

## Code Snippet
\`\`\`typescript
private readonly conversations = new Map<string, AMessage[]>();
private readonly thinkingStates = new Map<string, ThinkingState>();
// ... never evicted during normal operation
\`\`\`

## Impact
Long-running Electron sessions (e.g., a developer using tday for hours with many LLM interactions) experience progressive memory growth. This can lead to UI jank, increased GC pressure, and eventually out-of-memory crashes in the renderer process.

## Suggested Fix
Apply LRU or TTL-based eviction:
- Limit \`conversations\` to the 50 most recent entries
- Delete entries older than 1 hour
- At minimum, delete \`previous_response_id\` entries once they're superseded by a new response in the chain
`
            });

      - name: Create P2 - Android shell_args joins without escaping — shell injection
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[P2] Android shell_args joins arguments without escaping — shell injection on Android device',
              labels: ['bug', 'security'],
              body: `## Priority: P2 (Security)

## Description
\`shell_args\` constructs a command string by joining its argument slice with a space character and passing the result to \`shell()\`, which runs it verbatim on the Android device shell.

Arguments that contain spaces, \`$\`, backticks, or other shell metacharacters will be **interpreted by the device shell**. \`press_key\` does not validate or sanitize the \`key\` argument before passing it to \`shell_args\`.

An attacker who can send arbitrary \`android_press_key\` requests (e.g., via the unauthenticated HTTP endpoint) could inject arbitrary shell commands on the connected Android device.

## File
\`crates/tday-nativecore/src/android/device.rs\`, lines 62–64

## Code Snippet
\`\`\`rust
pub fn shell_args(&mut self, args: &[&str]) -> Result<String, String> {
    self.shell(&args.join(" "))
}
\`\`\`

## Impact
Shell injection on the connected Android device. Combined with the unauthenticated HTTP MCP server (see related security issue), any local process can send crafted \`key\` values to execute arbitrary commands on the Android device via ADB, potentially leading to data exfiltration, app manipulation, or device compromise.

## Suggested Fix
1. Validate key arguments against a strict allowlist of \`KEYCODE_*\` values before passing to \`shell_args\`
2. Shell-quote each argument before joining (single-quote wrap with \`'\` escaped as \`'\\'')\`)

\`\`\`rust
fn shell_quote(s: &str) -> String {
    format!("'{}'", s.replace("'", "'\\''"))
}
pub fn shell_args(&mut self, args: &[&str]) -> Result<String, String> {
    let quoted: Vec<String> = args.iter().map(|a| shell_quote(a)).collect();
    self.shell(&quoted.join(" "))
}
\`\`\`
`
            });
