name: Create Bug Issues

on:
  workflow_dispatch:
  push:
    branches:
      - copilot/create-issues-for-all-bugs
    paths:
      - '.github/workflows/create-bug-issues.yml'
      - '.github/scripts/create-issues.js'

jobs:
  create-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
      - name: Create all P1/P2 bug issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node .github/scripts/create-issues.js
