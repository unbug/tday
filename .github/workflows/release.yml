name: release

# Builds Tday installers and uploads them as workflow artifacts. The workflow
# runs only when triggered manually from the Actions page.
#
# Triggers:
#   - manual dispatch from Actions -> build only (or draft release if
#                                     `publish` is checked)

on:
  # Pushing a vX.Y.Z tag (created by scripts/release.mjs) kicks off a full
  # build + publishes a draft GitHub Release automatically.
  push:
    tags:
      - 'v*'
  # Manual fallback: lets you build from any branch/commit without a tag.
  workflow_dispatch:
    inputs:
      publish:
        description: 'Create a draft GitHub Release with the artifacts'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos arm64
            platform: mac
            arch: arm64
            runner: macos-14
          - label: windows x64
            platform: win
            arch: x64
            runner: windows-2022
          - label: linux x64
            platform: linux
            arch: x64
            runner: ubuntu-22.04
    runs-on: ${{ matrix.runner }}
    env:
      ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
      ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/
      # Match the local config (`identity: null` in electron-builder.yml):
      # don't try to discover or use a Developer-ID signing identity.
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Show Python version
        run: python --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Build renderer + main
        run: pnpm --filter @tday/desktop build

      - name: Package (${{ matrix.platform }} ${{ matrix.arch }})
        run: pnpm --filter @tday/desktop exec electron-builder --${{ matrix.platform }} --${{ matrix.arch }} -c electron-builder.yml --publish never

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist-artifacts
          find apps/desktop/release -type f \
            \( -name 'Tday-*.dmg' -o -name 'Tday-*.zip' -o -name 'Tday-*.exe' -o -name 'Tday-*.AppImage' -o -name 'Tday-*.tar.gz' \) \
            -exec cp {} dist-artifacts/ \;
          ls -la dist-artifacts

      - uses: actions/upload-artifact@v4
        with:
          name: tday-${{ github.run_id }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist-artifacts/*
          if-no-files-found: error
          retention-days: 14

  publish:
    name: publish github release
    needs: build
    # Run on tag pushes (automatic), or when manually triggered with publish=true.
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List downloaded files
        run: ls -la dist

      - uses: softprops/action-gh-release@v2
        with:
          # On a tag push, github.ref_name is the tag (e.g. v0.1.24).
          # On a manual dispatch there is no tag, so fall back to a placeholder.
          tag_name: "${{ github.ref_type == 'tag' && github.ref_name || format('v0.0.0-manual-{0}', github.run_number) }}"
          name: "${{ github.ref_type == 'tag' && github.ref_name || format('Manual build #{0}', github.run_number) }}"
          # Tag-push builds are published immediately; manual ones stay as drafts.
          draft: ${{ github.event_name == 'workflow_dispatch' }}
          generate_release_notes: true
          files: dist/*
